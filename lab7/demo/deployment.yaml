apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nlp-app
  template:
    metadata:
      labels:
        app: nlp-app
    spec:
      containers:
        - name: nlp-app-container
          image: your-dockerhub-username/nlp-app:latest
          ports:
            - containerPort: 8080